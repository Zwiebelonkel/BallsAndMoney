<div id="root">

  <div id="canvas-wrap">

    <canvas id="c"></canvas>

    <div id="ui">
      <div id="top-bar">
        <div class="pill" id="coins-pill">
          💰 <span id="coins-val">0</span>
        </div>

        <div class="pill" id="col-pill">
          💥 <span id="col-val">0</span>/s
        </div>

        <div class="pill" id="combo-pill" style="opacity:0">
          🔥 x<span id="combo-val">1</span>
        </div>
      </div>

      <div id="system-meters" aria-label="Systemwerte">
        <div class="system-meter" id="fps-meter">FPS <span id="fps-val">0</span></div>
        <div class="system-meter" id="energy-meter">Energie im System <span id="energy-val">0</span></div>
      </div>

      <div id="hint-msg">
        Drag/Touch → Kugel schießen · Kurzer Tipp/Klick = zufällig
      </div>
    </div>

    <div id="float-coins"></div>

    <div id="dashboard">

      <div class="graph-grid">
        <div class="graph-card">
          <div class="dash-header">
            <span class="dash-label">Kollisionen</span>
          </div>

          <div>
            <span id="dash-collisions">0</span>
            <span class="dash-collisions-unit">/s</span>
          </div>

          <canvas id="collision-graph" width="205" height="54"></canvas>

          <div class="dash-sub">
            <div class="dash-stat">max <span id="dash-collisions-max">0</span></div>
            <div class="dash-stat">Ø <span id="dash-collisions-avg">0</span></div>
            <div class="dash-stat">Kugeln <span id="dash-n">0</span></div>
          </div>
        </div>

        <div class="graph-card">
          <div class="dash-header">
            <span class="dash-label">Money</span>
          </div>

          <div>
            <span id="dash-money">0</span>
            <span class="dash-collisions-unit">/s</span>
          </div>

          <canvas id="money-graph" width="205" height="54"></canvas>

          <div class="dash-sub">
            <div class="dash-stat">max <span id="dash-money-max">0</span></div>
            <div class="dash-stat">Ø <span id="dash-money-avg">0</span></div>
            <div class="dash-stat">Global x<span id="dash-global-mult">1</span></div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div id="shop">

    <div id="shop-header">
      <h2>Shop</h2>
      <p>Kollisionen = Münzen</p>
    </div>

    <div id="shop-items">

      <div class="section-label">Upgrades</div>

      <button class="upgrade-btn" id="btn-size">
        <div class="btn-name">Größe +</div>
        <div class="btn-desc">Nur neue Kugeln wachsen leicht</div>
        <div class="btn-cost" id="cost-size">55 🪙</div>
      </button>

      <button class="upgrade-btn" id="btn-mult">
        <div class="btn-name">Multiplikator</div>
        <div class="btn-desc">Deutlich mehr Münzen pro Kollision</div>
        <div class="btn-cost" id="cost-mult">80 🪙</div>
      </button>

      <button class="upgrade-btn" id="btn-cap">
        <div class="btn-name">Kapazität +</div>
        <div class="btn-desc">Jedes Level erhöht die Kugel-Kapazität um +1</div>
        <div class="btn-cost" id="cost-cap">120 🪙</div>
      </button>

      <button class="upgrade-btn" id="btn-combo">
        <div class="btn-name">Combo-Bonus</div>
        <div class="btn-desc">Stärkerer Bonus bei schnellen Kollisionen</div>
        <div class="btn-cost" id="cost-combo">280 🪙</div>
      </button>

      <button class="upgrade-btn" id="btn-launch">
        <div class="btn-name">Launch-Power</div>
        <div class="btn-desc">Neue Kugeln starten kräftiger</div>
        <div class="btn-cost" id="cost-launch">70 🪙</div>
      </button>

      <button class="upgrade-btn" id="btn-border">
        <div class="btn-name">Border</div>
        <div class="btn-desc">Late Game: Wand-Kollisionen zahlen anteilig</div>
        <div class="btn-cost" id="cost-border">85.000 🪙</div>
      </button>

      <button class="upgrade-btn" id="btn-money-area-count">
        <div class="btn-name">Money Area +</div>
        <div class="btn-desc">Platziert eine kleine Geld-Zone im Feld</div>
        <div class="btn-cost" id="cost-money-area-count">650 🪙</div>
      </button>

      <button class="upgrade-btn" id="btn-money-area-value">
        <div class="btn-name">Area-Wert +</div>
        <div class="btn-desc">Erhöht die Auszahlung aller Money Areas</div>
        <div class="btn-cost" id="cost-money-area-value">1.100 🪙</div>
      </button>

      <app-balls-panel></app-balls-panel>

      <app-prestige-panel></app-prestige-panel>

      <app-achievement-panel></app-achievement-panel>

      <app-leaderboard-panel></app-leaderboard-panel>

      <app-settings-panel></app-settings-panel>

    </div>
  </div>

</div>
